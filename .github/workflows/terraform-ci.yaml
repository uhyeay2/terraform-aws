# ------------------------------------------------------------------------------
# Terraform CI Pipeline (Global Static Analysis)
# ------------------------------------------------------------------------------
# This workflow performs environment-agnostic static analysis for all Terraform
# code in the repository. It ensures consistent formatting, validates module
# structure, enforces linting rules, and performs security scanning.
#
# Tools integrated:
# - Terraform CLI
# - TFLint (linting)
# - Checkov (security scanning)
#
# This workflow runs on all pull requests and pushes that modify Terraform-
# related files. It acts as the project's global quality gate before any
# environment-specific planning or deployment occurs.
# ------------------------------------------------------------------------------

name: Terraform CI

on:
  pull_request:
    branches: [ "*" ]
  push:
    branches: [ "*" ]

permissions:
  contents: read

jobs:
  static-checks:
    name: Global Terraform Static Checks
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------------
      # Checkout repository
      # ------------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------------
      # Setup Terraform
      # ------------------------------------------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      # ------------------------------------------------------------------------
      # Terraform Format Check
      # Ensures all Terraform files follow canonical formatting.
      # ------------------------------------------------------------------------
      - name: Terraform Format
        run: terraform fmt -recursive -check

      # ------------------------------------------------------------------------
      # Terraform Validate (all modules)
      # Automatically discovers all Terraform directories and validates each.
      # ------------------------------------------------------------------------
      - name: Terraform Validate (all modules)
        run: |
          echo "=== Validating all Terraform modules ==="
          for dir in $(find . -type f -name "*.tf" -exec dirname {} \; | sort -u); do
            echo "--- Validating: $dir ---"
            terraform -chdir="$dir" init -backend=false -input=false >/dev/null
            terraform -chdir="$dir" validate
          done

      # ------------------------------------------------------------------------
      # Setup TFLint
      # Uses the official action for deterministic, version-pinned installation.
      # ------------------------------------------------------------------------
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3

      # ------------------------------------------------------------------------
      # Initialize TFLint Plugins
      # Ensures plugin directory creation and plugin installation.
      # ------------------------------------------------------------------------
      - name: TFLint Plugin Initialization
        run: |
          echo "=== Initializing TFLint Plugins ==="
          tflint --init

      # ------------------------------------------------------------------------
      # Run TFLint
      # Executes linting using the project's configuration file.
      # ------------------------------------------------------------------------
      - name: TFLint
        run: |
          echo "=== Running TFLint ==="
          tflint --config=tools/tflint.hcl

      # ------------------------------------------------------------------------
      # Install Checkov (version pinned)
      # Ensures deterministic security scanning behavior.
      # ------------------------------------------------------------------------
      - name: Install Checkov
        run: pip install checkov==3.2.260

      # ------------------------------------------------------------------------
      # Run Checkov Security Scan (Terraform-only)
      # Scans all Terraform directories recursively using the project's config.
      # ------------------------------------------------------------------------
      - name: Checkov Security Scan
        run: |
          echo "=== Running Checkov Security Scan ==="
          checkov -d . --framework terraform --config-file tools/checkov-config.yaml
