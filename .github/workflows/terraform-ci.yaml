# ------------------------------------------------------------------------------
# Terraform CI Pipeline (Global Static Analysis)
# ------------------------------------------------------------------------------
# This workflow performs environment-agnostic static analysis for all Terraform
# code in the repository. It ensures consistent formatting, validates module
# structure, enforces linting rules, and performs security scanning.
#
# Tools integrated:
# - Terraform CLI
# - TFLint (linting)
# - Checkov (security scanning)
#
# This workflow runs on all branches and all pull requests. It acts as the
# project's global quality gate before any environment-specific planning or
# deployment occurs.
# ------------------------------------------------------------------------------

name: Terraform CI

on:
  pull_request:
    branches: [ "*" ]
  push:
    branches: [ "*" ]

permissions:
  contents: read

jobs:
  static-checks:
    name: Global Terraform Static Checks
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------------
      # Checkout repository
      # ------------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------------
      # Setup Terraform
      # ------------------------------------------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      # ------------------------------------------------------------------------
      # Terraform Format Check
      # Ensures all Terraform files follow canonical formatting.
      # ------------------------------------------------------------------------
      - name: Terraform Format
        run: terraform fmt -recursive -check

      # ------------------------------------------------------------------------
      # Terraform Validate (root/modules)
      # Validates shared modules or root-level configurations.
      # ------------------------------------------------------------------------
      - name: Terraform Validate (root)
        run: terraform validate || true

      # ------------------------------------------------------------------------
      # Install TFLint
      # Includes diagnostic output to verify installation paths and environment.
      # ------------------------------------------------------------------------
      - name: Install TFLint
        working-directory: ${{ github.workspace }}
        run: |
          echo "=== Installing TFLint ==="
          echo "Working directory: $(pwd)"
          echo "Installing TFLint..."
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          echo "TFLint binary location:"
          which tflint || true
          echo "TFLint version:"
          tflint --version || true

      # ------------------------------------------------------------------------
      # Initialize TFLint Plugins
      # Adds extensive diagnostics to confirm plugin directory creation,
      # working directory, and plugin installation behavior.
      # ------------------------------------------------------------------------
      - name: TFLint Plugin Initialization
        working-directory: ${{ github.workspace }}
        run: |
          echo "=== TFLint Plugin Initialization ==="
          echo "Working directory: $(pwd)"
          echo "Running tflint --init..."
          tflint --init
          echo "TFLint version:"
          tflint --version || true

      # ------------------------------------------------------------------------
      # Run TFLint
      # Includes diagnostics to confirm plugin loading, working directory,
      # and configuration file resolution.
      # ------------------------------------------------------------------------
      - name: TFLint
        working-directory: ${{ github.workspace }}
        run: |
          echo "=== TFLint RUN ==="
          echo "Working directory: $(pwd)"
          echo "Running TFLint with config..."
          tflint --config=tools/tflint.hcl \

      # ------------------------------------------------------------------------
      # Install Checkov
      # ------------------------------------------------------------------------
      - name: Install Checkov
        run: pip install checkov

      # ------------------------------------------------------------------------
      # Run Checkov Security Scan (recursive)
      # Scans all Terraform directories, including nested modules, by targeting
      # the repository root. Uses the project's configuration file for rule
      # enforcement and suppression handling.
      # ------------------------------------------------------------------------
      - name: Checkov Security Scan
        run: checkov -d . --config-file tools/checkov-config.yaml