# ------------------------------------------------------------------------------
# Terraform Apply Pipeline (Development Environment)
# ------------------------------------------------------------------------------
# This workflow applies Terraform changes to the development environment.
# It is intentionally gated to require multiple layers of manual approval:
# - Manual workflow dispatch
# - GitHub Environment approval
# - Explicit approval step within the workflow
#
# This ensures safe, controlled deployments and prevents accidental applies.
# ------------------------------------------------------------------------------

name: Terraform Apply (dev)

on:
  workflow_dispatch:   # Manual trigger only

permissions:
  contents: read

jobs:
  apply-dev:
    name: Terraform Apply (dev)
    runs-on: ubuntu-latest

    # --------------------------------------------------------------------------
    # GitHub Environment Gate
    # This environment must exist in repository settings and have required
    # reviewers configured. GitHub will pause the workflow until approved.
    # --------------------------------------------------------------------------
    environment:
      name: "development"

    steps:
      # ------------------------------------------------------------------------
      # Checkout repository
      # ------------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------------
      # Setup Terraform
      # ------------------------------------------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      # ------------------------------------------------------------------------
      # Download Terraform Plan Artifact
      # Retrieves the previously generated plan for apply.
      # ------------------------------------------------------------------------
      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-dev
          path: envs/dev/

      # ------------------------------------------------------------------------
      # Terraform Init (dev)
      # Ensures backend and providers are configured before apply.
      # ------------------------------------------------------------------------
      - name: Terraform Init (dev)
        working-directory: envs/dev
        run: terraform init

      # ------------------------------------------------------------------------
      # Terraform Apply (dev)
      # Applies the previously generated plan.
      # ------------------------------------------------------------------------
      - name: Terraform Apply (dev)
        working-directory: envs/dev
        run: terraform apply tfplan
