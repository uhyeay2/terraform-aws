# ------------------------------------------------------------------------------
# Terraform CI Pipeline — Static Formatting & Validation (Matrix)
# ------------------------------------------------------------------------------
# This workflow performs:
#   - Terraform formatting (fmt)
#   - Terraform validation (validate)
#
# It runs as a matrix across:
#   - Multiple Terraform versions
#   - Multiple Terraform modules
#
# Workflow structure:
#   1. Load centralized CI configuration
#   2. Matrix job: terraform setup via reusable terraform-common.yml
#   3. Matrix job: run fmt + validate for each module + version combination
#
# ------------------------------------------------------------------------------

name: Terraform Static Checks

on:
  pull_request:
    branches: [ "*" ]
  push:
    branches: [ "*" ]

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------------
  # Load centralized CI configuration
  # ------------------------------------------------------------------------
  load-config:
    uses: ./.github/workflows/terraform-load-config.yml

  # ------------------------------------------------------------------------
  # Matrix Terraform Setup
  #
  # This job:
  #   - Expands into multiple jobs based on Terraform versions + modules
  #   - Calls the reusable terraform-common.yml workflow
  #
  # ------------------------------------------------------------------------
  static-checks-setup:
    needs: load-config

    strategy:
      fail-fast: ${{ fromJson(needs.load-config.outputs.fail_fast_static) }}
      matrix:
        terraform_version: ${{ fromJson(needs.load-config.outputs.versions) }}
        module: ${{ fromJson(needs.load-config.outputs.modules) }}

    uses: ./.github/workflows/terraform-common.yml
    with:
      terraform_version: ${{ matrix.terraform_version }}

  # ------------------------------------------------------------------------
  # Matrix Static Checks Execution
  #
  # This job:
  #   - Uses the same matrix as static-checks-setup
  #   - Runs Terraform fmt and validate for each module
  #
  # ------------------------------------------------------------------------
  run-static-checks:
    name: Run Static Checks
    needs:
      - load-config
      - static-checks-setup
    runs-on: ubuntu-latest

    strategy:
      fail-fast: ${{ fromJson(needs.load-config.outputs.fail_fast_static) }}
      matrix:
        terraform_version: ${{ fromJson(needs.load-config.outputs.versions) }}
        module: ${{ fromJson(needs.load-config.outputs.modules) }}

    steps:
      # --------------------------------------------------------------------
      # Checkout repository
      # --------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------------------------
      # Terraform Format Check
      # --------------------------------------------------------------------
      - name: Terraform Format
        run: terraform fmt -recursive -check

      # --------------------------------------------------------------------
      # Terraform Validate (module-specific)
      # --------------------------------------------------------------------
      - name: Terraform Validate
        run: |
          echo "=== Validating module: ${{ matrix.module }} ==="
          terraform -chdir="${{ matrix.module }}" init -backend=false -input=false >/dev/null
          terraform -chdir="${{ matrix.module }}" validate
