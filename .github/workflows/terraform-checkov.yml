# ------------------------------------------------------------------------------
# Terraform CI Pipeline — Checkov Security Scanning (Matrix)
# ------------------------------------------------------------------------------
# This workflow performs static security scanning using Checkov.
#
# It runs as a matrix across:
# - Multiple Terraform versions
# - Multiple Terraform modules
#
# Each matrix job calls the reusable "Terraform Common" workflow for setup.
# ------------------------------------------------------------------------------

name: Terraform Checkov Security Scan

on:
  pull_request:
    branches: [ "*" ]
  push:
    branches: [ "*" ]

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------------
  # Load Configs from .github/terraform-ci-config.yml (ie Terraform Version, Modules)
  # ------------------------------------------------------------------------
  load-config:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.cfg.outputs.versions }}
      modules: ${{ steps.cfg.outputs.modules }}
      checkov: ${{ steps.cfg.outputs.checkov }}
    steps:
      - uses: actions/checkout@v4

      - name: Load CI config
        id: cfg
        run: |
          sudo apt-get update && sudo apt-get install -y yq
          echo "versions=$(yq '.terraform_versions' -o=json .github/terraform-ci-config.yml)" >> $GITHUB_OUTPUT
          echo "modules=$(yq '.modules' -o=json .github/terraform-ci-config.yml)" >> $GITHUB_OUTPUT
          echo "checkov=$(yq '.checkov_version' .github/terraform-ci-config.yml)" >> $GITHUB_OUTPUT

  # ------------------------------------------------------------------------
  # Setup Checkov, use terraform version from config
  # ------------------------------------------------------------------------
  checkov-setup:
    needs: load-config
    strategy:
      fail-fast: false
      matrix:
        terraform_version: ${{ fromJson(needs.load-config.outputs.versions) }}
        module: ${{ fromJson(needs.load-config.outputs.modules) }}

    uses: ./.github/workflows/terraform-common.yml
    with:
      terraform_version: ${{ matrix.terraform_version }}

  # ------------------------------------------------------------------------
  # Run Checkov
  # ------------------------------------------------------------------------
  checkov:
    name: Run Checkov
    needs: 
      - load-config
      - checkov-setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------------
      # Install Checkov (version from centralized config)
      # ------------------------------------------------------------------------
      - name: Install Checkov
        run: pip install checkov==${{ needs.load-config.outputs.checkov }}

      # ------------------------------------------------------------------------
      # Run Checkov (module-specific)
      # ------------------------------------------------------------------------
      - name: Checkov Security Scan
        run: |
          echo "=== Running Checkov on module: ${{ matrix.module }} ==="
          checkov -d ${{ matrix.module }} --framework terraform --config-file tools/checkov-config.yaml
