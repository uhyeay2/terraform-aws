# ------------------------------------------------------------------------------
# Terraform CI Pipeline — TFLint Linting (Matrix)
# ------------------------------------------------------------------------------
# This workflow performs Terraform linting using TFLint.
#
# It runs as a matrix across:
# - Multiple Terraform versions
# - Multiple Terraform modules
#
# Each matrix job calls the reusable "Terraform Common" workflow for setup.
# ------------------------------------------------------------------------------

name: Terraform TFLint

on:
  pull_request:
    branches: [ "*" ]
  push:
    branches: [ "*" ]

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------------
  # Load Configs from .github/terraform-ci-config.yml (ie Terraform Version, Modules, TFlint Version)
  # ------------------------------------------------------------------------
  load-config:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.cfg.outputs.versions }}
      modules: ${{ steps.cfg.outputs.modules }}
      tflint: ${{ steps.cfg.outputs.tflint }}
    steps:
      - uses: actions/checkout@v4

      - name: Load CI config
        id: cfg
        run: |
          sudo apt-get update && sudo apt-get install -y yq
          echo "versions=$(yq '.terraform_versions' -o=json .github/terraform-ci-config.yml)" >> $GITHUB_OUTPUT
          echo "modules=$(yq '.modules' -o=json .github/terraform-ci-config.yml)" >> $GITHUB_OUTPUT
          echo "tflint=$(yq '.tflint_version' .github/terraform-ci-config.yml)" >> $GITHUB_OUTPUT
        
  # ------------------------------------------------------------------------
  # Setup tflint, use terraform version from config
  # ------------------------------------------------------------------------
  tflint-setup:
    needs: load-config
    strategy:
      fail-fast: false
      matrix:
        terraform_version: ${{ fromJson(needs.load-config.outputs.versions) }}
        module: ${{ fromJson(needs.load-config.outputs.modules) }}

    uses: ./.github/workflows/terraform-common.yml
    with:
      terraform_version: ${{ matrix.terraform_version }}

  # ------------------------------------------------------------------------
  # Run Tflint
  # ------------------------------------------------------------------------
  tflint:
    name: Run TFLint
    needs: 
        - load-config
        - tflint-setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------------
      # Setup TFLint (version from centralized config)
      # ------------------------------------------------------------------------
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ needs.load-config.outputs.tflint }}

      # ------------------------------------------------------------------------
      # Initialize TFLint Plugins
      # ------------------------------------------------------------------------
      - name: TFLint Plugin Initialization
        run: tflint --init

      # ------------------------------------------------------------------------
      # Run TFLint (module-specific)
      # ------------------------------------------------------------------------
      - name: TFLint
        run: |
          echo "=== Running TFLint on module: ${{ matrix.module }} ==="
          tflint --config=tools/tflint.hcl ${{ matrix.module }}
