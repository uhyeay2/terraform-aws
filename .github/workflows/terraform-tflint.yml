# ------------------------------------------------------------------------------
# Terraform CI Pipeline — TFLint Linting (Matrix)
# ------------------------------------------------------------------------------
# This workflow performs Terraform linting using TFLint.
#
# It runs as a matrix across:
# - Multiple Terraform versions
# - Multiple Terraform modules
#
# Workflow structure:
#   1. Load centralized CI configuration
#   2. Matrix job: terraform setup via reusable terraform-common.yml
#   3. Matrix job: run TFLint for each module + version combination
#
# ------------------------------------------------------------------------------

name: Terraform TFLint

on:
  pull_request:
    branches: [ "*" ]
  push:
    branches: [ "*" ]

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------------
  # Load centralized CI configuration
  # ------------------------------------------------------------------------
  load-config:
    uses: ./.github/workflows/terraform-load-config.yml

  # ------------------------------------------------------------------------
  # Matrix Terraform Setup
  #
  # This job:
  #   - Expands into multiple jobs based on Terraform versions + modules
  #   - Calls the reusable terraform-common.yml workflow
  #
  # ------------------------------------------------------------------------
  tflint-setup:
    needs: load-config

    strategy:
      fail-fast: ${{ fromJson(needs.load-config.outputs.fail_fast_tflint) }}
      matrix:
        terraform_version: ${{ fromJson(needs.load-config.outputs.versions) }}
        module: ${{ fromJson(needs.load-config.outputs.modules) }}

    uses: ./.github/workflows/terraform-common.yml
    with:
      terraform_version: ${{ matrix.terraform_version }}

  # ------------------------------------------------------------------------
  # Matrix TFLint Scan
  #
  # This job:
  #   - Uses the same matrix as tflint-setup
  #   - Installs TFLint
  #   - Initializes TFLint plugins
  #   - Runs TFLint against the module for this matrix entry
  #
  # ------------------------------------------------------------------------
  tflint:
    name: Run TFLint
    needs:
      - load-config
      - tflint-setup
    runs-on: ubuntu-latest

    strategy:
      fail-fast: ${{ fromJson(needs.load-config.outputs.fail_fast_tflint) }}
      matrix:
        terraform_version: ${{ fromJson(needs.load-config.outputs.versions) }}
        module: ${{ fromJson(needs.load-config.outputs.modules) }}

    steps:
      # --------------------------------------------------------------------
      # Checkout repository
      # --------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------------------------
      # Setup TFLint (version from centralized config)
      # --------------------------------------------------------------------
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ needs.load-config.outputs.tflint }}

      # --------------------------------------------------------------------
      # Initialize TFLint Plugins
      # --------------------------------------------------------------------
      - name: TFLint Plugin Initialization
        run: tflint --init

      # --------------------------------------------------------------------
      # Run TFLint (module-specific)
      # --------------------------------------------------------------------
      - name: TFLint Scan
        run: |
          echo "=== Running TFLint on module: ${{ matrix.module }} ==="
          tflint --config=tools/tflint.hcl ${{ matrix.module }}
