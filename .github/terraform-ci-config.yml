# ------------------------------------------------------------------------------
# Centralized Terraform CI Configuration
# ------------------------------------------------------------------------------
# This file defines the Terraform versions and module paths used across all CI
# workflows. It acts as the single source of truth for matrix generation.
# ------------------------------------------------------------------------------

# Terraform Version
terraform_versions:
  - "1.12.1"
  - "1.15.5"

# Modules - TODO: Load these dynamically.
modules:
  - "modules/network"
  - "modules/compute"
  - "modules/storage"

# Tool Versions
checkov_version: "3.2.260"
tflint_version: "v0.62.1"

# Per-Workflow Fail-Fast Settings
fail_fast:
  static_checks: true
  tflint: true
  checkov: false
